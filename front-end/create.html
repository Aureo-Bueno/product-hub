<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <title>Cadastro</title>
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Loja Produtos</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="create.html">Cadastro</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="list.html">Listagem</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-lg-8 col-md-10">
          <div class="card shadow border-0">
            <div class="card-header bg-primary text-white text-center py-3">
              <h2 class="h4 mb-0">Cadastro</h2>
            </div>
            <div class="card-body p-4">
              <ul class="nav nav-tabs mb-4" id="cadastroTab">
                <li class="nav-item">
                  <button
                    class="nav-link active"
                    data-bs-toggle="tab"
                    data-bs-target="#tabCategoria"
                  >
                    Categoria
                  </button>
                </li>
                <li class="nav-item">
                  <button
                    class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#tabDepartamento"
                  >
                    Departamento
                  </button>
                </li>
                <li class="nav-item">
                  <button
                    class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#tabProduto"
                  >
                    Produto
                  </button>
                </li>
              </ul>

              <div class="tab-content">
                <div class="tab-pane fade show active" id="tabCategoria">
                  <form id="categoryForm">
                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <label for="catName" class="form-label fw-semibold"
                          >Nome</label
                        >
                        <div class="input-group">
                          <input
                            type="text"
                            class="form-control"
                            id="catName"
                            placeholder="Ex: Inteligência Artificial"
                            required
                          />
                          <button
                            type="button"
                            class="btn btn-outline-warning"
                            id="btnCorrectCatName"
                            title="Corrigir nome com IA"
                          >
                            Corrigir
                          </button>
                        </div>
                      </div>
                      <div class="col-md-6 mb-3">
                        <label
                          for="catDepartmentId"
                          class="form-label fw-semibold"
                          >Departamento</label
                        >
                        <select
                          class="form-select"
                          id="catDepartmentId"
                        ></select>
                      </div>
                    </div>

                    <div class="mb-3">
                      <label for="catDescription" class="form-label fw-semibold"
                        >Descrição</label
                      >
                      <div class="input-group">
                        <textarea
                          class="form-control"
                          id="catDescription"
                          rows="2"
                          placeholder="Descrição da categoria..."
                        ></textarea>
                        <button
                          type="button"
                          class="btn btn-outline-info"
                          id="btnGenCatDesc"
                          title="Gerar descrição com IA"
                        >
                          Gerar
                        </button>
                      </div>
                    </div>

                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <label
                          for="catDateCreate"
                          class="form-label fw-semibold"
                          >Data de Cadastro</label
                        >
                        <input
                          type="date"
                          class="form-control"
                          id="catDateCreate"
                          required
                        />
                      </div>
                      <div class="col-md-6 mb-3">
                        <label for="catParentId" class="form-label fw-semibold"
                          >Categoria Pai</label
                        >
                        <select class="form-select" id="catParentId">
                          <option value="">Nenhuma (raiz)</option>
                        </select>
                      </div>
                    </div>

                    <div class="mb-3">
                      <label for="catTags" class="form-label fw-semibold"
                        >Tags</label
                      >
                      <input
                        type="text"
                        class="form-control"
                        id="catTags"
                        placeholder="backend, java, spring (separadas por vírgula)"
                      />
                    </div>

                    <div class="row mb-3">
                      <div class="col-md-6">
                        <button
                          type="button"
                          class="btn btn-outline-danger w-100"
                          id="btnCheckDuplicate"
                        >
                          Verificar Duplicidade
                        </button>
                      </div>
                      <div class="col-md-6" id="duplicateResult"></div>
                    </div>

                    <div class="mb-4 form-check">
                      <input
                        type="checkbox"
                        class="form-check-input"
                        id="catAcept"
                      />
                      <label class="form-check-label" for="catAcept"
                        >Aceito os termos e condições</label
                      >
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                      Cadastrar Categoria
                    </button>
                  </form>
                </div>

                <div class="tab-pane fade" id="tabDepartamento">
                  <form id="departmentForm">
                    <div class="mb-3">
                      <label for="deptName" class="form-label fw-semibold"
                        >Nome do Departamento</label
                      >
                      <input
                        type="text"
                        class="form-control"
                        id="deptName"
                        placeholder="Ex: Vendas, Marketing..."
                        required
                      />
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                      Criar Departamento
                    </button>
                  </form>
                </div>

                <div class="tab-pane fade" id="tabProduto">
                  <form id="productForm">
                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <label for="prodName" class="form-label fw-semibold"
                          >Nome</label
                        >
                        <div class="input-group">
                          <input
                            type="text"
                            class="form-control"
                            id="prodName"
                            placeholder="Ex: Notebook Dell"
                            required
                          />
                          <button
                            type="button"
                            class="btn btn-outline-warning"
                            id="btnCorrectProdName"
                            title="Corrigir nome com IA"
                          >
                            Corrigir
                          </button>
                        </div>
                      </div>
                      <div class="col-md-6 mb-3">
                        <label for="prodPrice" class="form-label fw-semibold"
                          >Preço</label
                        >
                        <input
                          type="number"
                          step="0.01"
                          min="0"
                          class="form-control"
                          id="prodPrice"
                          placeholder="0,00"
                        />
                      </div>
                    </div>

                    <div class="mb-3">
                      <label
                        for="prodDescription"
                        class="form-label fw-semibold"
                        >Descrição</label
                      >
                      <div class="input-group">
                        <textarea
                          class="form-control"
                          id="prodDescription"
                          rows="2"
                          placeholder="Descrição do produto..."
                        ></textarea>
                        <button
                          type="button"
                          class="btn btn-outline-info"
                          id="btnGenProdDesc"
                          title="Gerar descrição com IA"
                        >
                          Gerar
                        </button>
                      </div>
                    </div>

                    <div class="row">
                      <div class="col-md-6 mb-3">
                        <label
                          for="prodCategoryId"
                          class="form-label fw-semibold"
                          >Categoria</label
                        >
                        <select
                          class="form-select"
                          id="prodCategoryId"
                        ></select>
                      </div>
                      <div class="col-md-6 mb-3">
                        <label
                          for="prodDateCreate"
                          class="form-label fw-semibold"
                          >Data de Cadastro</label
                        >
                        <input
                          type="date"
                          class="form-control"
                          id="prodDateCreate"
                          required
                        />
                      </div>
                    </div>

                    <div class="mb-3">
                      <label for="prodTags" class="form-label fw-semibold"
                        >Tags</label
                      >
                      <input
                        type="text"
                        class="form-control"
                        id="prodTags"
                        placeholder="eletrônicos, promoção (separadas por vírgula)"
                      />
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                      Cadastrar Produto
                    </button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
      <p class="mb-0">&copy; 2026 Loja Produtos</p>
    </footer>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/pages/create.js"></script>
  </body>
</html>
