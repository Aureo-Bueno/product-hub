<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <title>Listagem</title>
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Loja Produtos</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="create.html">Cadastro</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="list.html">Listagem</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-lg-12">
          <div class="card shadow border-0">
            <div
              class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-3 flex-wrap gap-2"
            >
              <h2 class="h4 mb-0">Listagem</h2>
              <div class="d-flex gap-2">
                <a href="create.html" class="btn btn-light btn-sm">+ Novo</a>
                <a href="/api/categories/export" class="btn btn-success btn-sm"
                  >CSV</a
                >
              </div>
            </div>
            <div class="card-body">
              <ul class="nav nav-tabs mb-4" id="listTab">
                <li class="nav-item">
                  <button
                    class="nav-link active"
                    data-bs-toggle="tab"
                    data-bs-target="#tabCategorias"
                  >
                    Categorias
                  </button>
                </li>
                <li class="nav-item">
                  <button
                    class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#tabDepartamentos"
                  >
                    Departamentos
                  </button>
                </li>
                <li class="nav-item">
                  <button
                    class="nav-link"
                    data-bs-toggle="tab"
                    data-bs-target="#tabProdutos"
                  >
                    Produtos
                  </button>
                </li>
              </ul>

              <div class="tab-content">
                <div class="tab-pane fade show active" id="tabCategorias">
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <div class="input-group">
                        <input
                          type="text"
                          class="form-control"
                          id="catSearch"
                          placeholder="Buscar por nome, descrição ou departamento..."
                          id="catSearch"
                        />
                        <button
                          class="btn btn-outline-secondary"
                          id="catSearchBtn"
                        >
                          Buscar
                        </button>
                      </div>
                    </div>
                    <div class="col-md-3">
                      <select class="form-select" id="catSort">
                        <option value="date|desc">Mais recentes</option>
                        <option value="date|asc">Mais antigas</option>
                        <option value="name|asc">Nome A-Z</option>
                        <option value="name|desc">Nome Z-A</option>
                        <option value="favorite|desc">
                          Favoritas primeiro
                        </option>
                      </select>
                    </div>
                    <div class="col-md-3">
                      <a
                        href="?tab=categorias&filter=favorites"
                        class="btn btn-outline-danger w-100"
                      >
                        Favoritas
                      </a>
                    </div>
                  </div>
                  <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0">
                      <thead class="table-dark">
                        <tr>
                          <th>Nome</th>
                          <th>Departamento</th>
                          <th>Descrição</th>
                          <th>Tags</th>
                          <th>Data</th>
                          <th class="text-center">Fav</th>
                          <th class="text-center">Ações</th>
                        </tr>
                      </thead>
                      <tbody id="catTableBody"></tbody>
                    </table>
                  </div>
                  <nav class="mt-3">
                    <ul
                      class="pagination justify-content-center"
                      id="catPagination"
                    ></ul>
                  </nav>
                </div>

                <div class="tab-pane fade" id="tabDepartamentos">
                  <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0">
                      <thead class="table-dark">
                        <tr>
                          <th>ID</th>
                          <th>Nome</th>
                          <th class="text-center">Ações</th>
                        </tr>
                      </thead>
                      <tbody id="deptTableBody"></tbody>
                    </table>
                  </div>
                </div>

                <div class="tab-pane fade" id="tabProdutos">
                  <div class="row mb-3">
                    <div class="col-md-6">
                      <div class="input-group">
                        <input
                          type="text"
                          class="form-control"
                          id="prodSearch"
                          placeholder="Buscar por nome ou descrição..."
                          id="prodSearch"
                        />
                        <button
                          class="btn btn-outline-secondary"
                          id="prodSearchBtn"
                        >
                          Buscar
                        </button>
                      </div>
                    </div>
                    <div class="col-md-3">
                      <select class="form-select" id="prodSort" id="prodSort">
                        <option value="date|desc">Mais recentes</option>
                        <option value="date|asc">Mais antigos</option>
                        <option value="name|asc">Nome A-Z</option>
                        <option value="name|desc">Nome Z-A</option>
                        <option value="price|asc">Menor preço</option>
                        <option value="price|desc">Maior preço</option>
                      </select>
                    </div>
                    <div class="col-md-3">
                      <button
                        class="btn btn-outline-danger w-100"
                        id="prodFavBtn"
                      >
                        Favoritos
                      </button>
                    </div>
                  </div>
                  <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0">
                      <thead class="table-dark">
                        <tr>
                          <th>Nome</th>
                          <th>Preço</th>
                          <th>Categoria</th>
                          <th>Departamento</th>
                          <th>Tags</th>
                          <th>Data</th>
                          <th class="text-center">Fav</th>
                          <th class="text-center">Ações</th>
                        </tr>
                      </thead>
                      <tbody id="prodTableBody"></tbody>
                    </table>
                  </div>
                  <nav class="mt-3">
                    <ul
                      class="pagination justify-content-center"
                      id="prodPagination"
                    ></ul>
                  </nav>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <footer class="bg-dark text-white text-center py-3 mt-5">
      <p class="mb-0">&copy; 2026 Loja Produtos</p>
    </footer>

    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script type="module" src="js/pages/list.js"></script>
  </body>
</html>
